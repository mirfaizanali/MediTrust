

# ============================
# MediConnect Configuration
# ============================

# Server
server.port=8081

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/mediconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=MediConnectSecretKeyForJWTTokenGeneration2024SecureKeyMustBeLong
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Logging
logging.level.com.mediconnect=DEBUG
logging.level.org.springframework.security=DEBUG